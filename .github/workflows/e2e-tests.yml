name: E2E Test Automation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      tags:
        description: 'Optional Cucumber tag filter. Leave empty to run every test.'
        required: false
        default: ''
        type: string
      browser:
        description: 'Browser to run tests on'
        required: false
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Resolve run config
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.config.outputs.env_name }}
      tags: ${{ steps.config.outputs.tags }}
      browser: ${{ steps.config.outputs.browser }}
      run_label: ${{ steps.config.outputs.run_label }}

    steps:
      - name: Resolve environment, tags, and browser
        id: config
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV_NAME="${{ github.event.inputs.environment }}"
            TAGS="${{ github.event.inputs.tags }}"
            BROWSER="${{ github.event.inputs.browser }}"
          else
            ENV_NAME="production"
            TAGS=""
            BROWSER="chromium"
          fi

          if [ "$ENV_NAME" = "staging" ] && [ -z "${{ secrets.BASE_URL_STAGING }}" ]; then
            echo "BASE_URL_STAGING is not set; falling back to production."
            ENV_NAME="production"
          fi

          if [ -z "$TAGS" ]; then
            RUN_LABEL="Full Suite ($ENV_NAME)"
          else
            RUN_LABEL="Tagged Suite ($ENV_NAME: $TAGS)"
          fi

          echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "browser=$BROWSER" >> "$GITHUB_OUTPUT"
          echo "run_label=$RUN_LABEL" >> "$GITHUB_OUTPUT"

  e2e:
    name: Cucumber E2E - ${{ needs.setup.outputs.run_label }}
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install ${{ needs.setup.outputs.browser }} --with-deps

      - name: Execute full E2E test suite
        id: run_tests
        env:
          BASE_URL: ${{ needs.setup.outputs.env_name == 'staging' && secrets.BASE_URL_STAGING || secrets.BASE_URL_PROD || 'https://influencerportal.com.tr' }}
          APP_LOCALE: en
          EMAIL: ${{ secrets.EMAIL || secrets.QA_USER_EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD || secrets.QA_USER_PASSWORD }}
          QA_USER_EMAIL: ${{ secrets.QA_USER_EMAIL }}
          QA_USER_PASSWORD: ${{ secrets.QA_USER_PASSWORD }}
          QA_BRAND_EMAIL: ${{ secrets.QA_BRAND_EMAIL }}
          QA_BRAND_PASSWORD: ${{ secrets.QA_BRAND_PASSWORD }}
          QA_ADMIN_EMAIL: ${{ secrets.QA_ADMIN_EMAIL }}
          QA_ADMIN_PASSWORD: ${{ secrets.QA_ADMIN_PASSWORD }}
          TAGS: ${{ needs.setup.outputs.tags }}
          BROWSER: ${{ needs.setup.outputs.browser }}
          HEADLESS: 'true'
          CI: 'true'
        run: npm run test:e2e:ci
        continue-on-error: true

      - name: Generate GitHub Actions report summary
        if: always()
        run: node e2e/utils/github-summary.mjs

      - name: Upload Cucumber report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-cucumber-report-${{ github.run_number }}
          path: |
            e2e/reports/index.html
            e2e/reports/cucumber-report.html
            e2e/reports/cucumber-report.json
            e2e/reports/report-summary.md
          retention-days: 14

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-screenshots-${{ github.run_number }}
          path: e2e/reports/screenshots/
          if-no-files-found: ignore
          retention-days: 7

      - name: Fail if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1
